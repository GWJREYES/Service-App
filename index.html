  html, body { margin: 0; padding: 0; height: 100%; background: #E9ECF1;

  #root { height: 100%; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #c7ced8; border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes gwPulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  /* Let one-finger touch scroll inner artboard regions even though the canvas
     viewport uses touch-action:none for panning. */
  [data-dc-slot] [style*="auto"], [data-dc-slot] *[style*="overflow"] { touch-action: pan-y; }
  /* No iOS tap-highlight flash on checkboxes/buttons; respect safe areas. */
  * { -webkit-tap-highlight-color: transparent; }

<!-- PWA: inject the manifest so the app installs full-screen on the iPad.
     No service worker — the techs have signal, and skipping the SW avoids
     stale-cache issues while we iterate during testing. -->
<script>
(function () {
  try {
    var m = document.createElement('link');
    m.rel = 'manifest'; m.href = 'manifest.webmanifest';
    document.head.appendChild(m);
  } catch (e) {}
  // Kill-switch: the previous build registered a service worker (sw.js) that
  // cached the old single-file app. Unregister any leftover worker and clear
  // its HTTP caches so already-installed iPads pick up this version. This does
  // NOT touch localStorage, so saved appointments/photos/recordings survive.
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
    }
  } catch (e) {}
})();
</script>
